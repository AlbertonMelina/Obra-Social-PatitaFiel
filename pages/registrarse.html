<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatitaFiel - Registrarse</title>
    <link rel="stylesheet" href="../css/registrarse.css">
</head>

<body>
    <div class="logo-container">
        <img src="../img/logo/logo-header.png" alt="Logo PatitaFiel" class="site-logo">
    </div>

    <div class="card-container">

        <h2>¡Te damos la bienvenida!</h2>
        <p class="subtitle">Unite a la comunidad que prioriza la salud de sus mejores amigos.</p>

        <form>
            <div class="input-group">
                <label for="fullname">Nombre y apellido</label>
                <input type="text" id="fullname" placeholder="Ingresá tu nombre y apellido" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="" required>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirma contraseña</label>
                <input type="password" id="confirm-password" placeholder="" required>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="terms" required>
                <label for="terms">Acepto los Términos y Condiciones y las Políticas de Privacidad</label>
            </div>

            <a href="panel-personal.html">
                <button type="button" class="btn-primary">Registrarme</button>
            </a>
        </form>

        <div class="divider">ó</div>

        <button class="btn-google">
            <img src="https://www.google.com/favicon.ico" alt="Google" width="16" height="16">
            Registrarse con Google
        </button>

        <p class="footer-text">¿Ya tenés una cuenta? <a href="iniciar-sesion.html">Iniciá sesión</a></p>
    </div>
</body>

</html>
