<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatitaFiel</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
<main class="form-container">
    <span class="step-indicator">Paso 2 de 4</span>
    <h2>Datos del titular</h2>
    <p class="subtitle">Ingresá tu información personal para la facturación y el alta del contrato de salud.</p>

    <form action="#" method="POST">
        <div class="form-grid">
            <div class="form-group full-width-mobile">
                <label for="nombre">Nombre y apellido</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre y apellido">
            </div>

            <div class="form-group row-group">
                <div class="sub-group">
                    <label for="tipo-doc">Documento</label>
                    <select id="tipo-doc">
                        <option value="DNI">DNI</option>
                        <option value="CI">CI</option>
                    </select>
                </div>
                <div class="sub-group num-doc">
                    <label for="nro-doc">Número</label>
                    <input type="text" id="nro-doc" placeholder="12345678">
                </div>
            </div>

            <div class="form-group">
                <label for="fecha-nac">Fecha de nacimiento</label>
                <input type="date" id="fecha-nac">
            </div>

            <div class="form-group">
                <label for="genero">Género</label>
                <select id="genero">
                    <option value="">Seleccionar</option>
                    <option value="F">Femenino</option>
                    <option value="M">Masculino</option>
                    <option value="X">No binario</option>
                </select>
            </div>

            <div class="form-group">
                <label for="provincia">Provincia</label>
                <select id="provincia">
                    <option value="">Seleccionar provincia</option>
                    </select>
            </div>

            <div class="form-group">
                <label for="localidad">Ciudad / Localidad</label>
                <input type="text" id="localidad" placeholder="Ej: San Justo">
            </div>

            <div class="form-group">
                <label for="domicilio">Domicilio</label>
                <input type="text" id="domicilio" placeholder="Calle y Número">
            </div>

            <div class="form-group">
                <label for="cp">Código Postal</label>
                <input type="text" id="cp" placeholder="1234">
            </div>
        </div>

        <div class="form-buttons">
            <button type="button" class="btn-secondary">Volver al paso anterior</button>
            <button type="submit" class="btn-primary">Siguiente</button>
        </div>
    </form>
</main>

    
</body>
</html>
